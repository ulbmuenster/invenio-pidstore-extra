[metadata]
name = invenio-urn-provider
version = attr: invenio_urn_provider.__version__
description = "Module that adds URN minting by DNB epicur service"
long_description = file: README.rst, CHANGES.rst
keywords = invenio TODO
license = MIT
author = University of Münster
author_email = forschungsdaten@uni-muenster.de
platforms = any
url = https://github.com/ulbmuenster/invenio-urn-provider
classifiers =
    Development Status :: 1 - Planning

[options]
include_package_data = True
packages = find:
python_requires = >=3.7
zip_safe = False
install_requires =
    invenio-base>=1.2.5
    invenio-i18n>=1.3.1

[options.extras_require]
tests =
    invenio-app>=1.3.4,<2.0.0
    pytest-invenio>=2.1.0,<3.0.0
    pytest-black>=0.3.0
opensearch2 =
    invenio-search[opensearch2]>=2.1.0,<3.0.0

[options.entry_points]
invenio_base.apps =
    invenio_urn_provider = invenio_urn_provider:InvenioUrnProvider
invenio_base.blueprints =
    invenio_urn_provider = invenio_urn_provider.views:blueprint
invenio_i18n.translations =
    messages = invenio_urn_provider
# TODO: Edit these entry points to fit your needs.
# invenio_access.actions =
# invenio_admin.actions =
# invenio_assets.bundles =
# invenio_base.api_apps =
# invenio_base.api_blueprints =
# invenio_celery.tasks =
# invenio_db.models =
# invenio_pidstore.minters =
# invenio_records.jsonresolver =


[bdist_wheel]
universal = 1

[pydocstyle]
add_ignore = D401

[isort]
profile=black

[check-manifest]
ignore =
    *-requirements.txt

[tool:pytest]
addopts = --black --isort --pydocstyle --cov=invenio_urn_provider --cov-report term --cov-report xml:coverage.xml --junitxml=report.xml
testpaths = tests invenio_urn_provider

[compile_catalog]
directory = invenio_urn_provider/translations/
use-fuzzy = True

[extract_messages]
copyright_holder = University of Münster
msgid_bugs_address = forschungsdaten@uni-muenster.de
mapping-file = babel.ini
output-file = invenio_urn_provider/translations/messages.pot
add-comments = NOTE

[init_catalog]
input-file = invenio_urn_provider/translations/messages.pot
output-dir = invenio_urn_provider/translations/

[update_catalog]
input-file = invenio_urn_provider/translations/messages.pot
output-dir = invenio_urn_provider/translations/
